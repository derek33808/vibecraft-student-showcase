<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeCraft · 学生作品展示投票墙</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="icon" href="public/logo.svg" type="image/svg+xml">
</head>
<body>

  <!-- ====== Navbar ====== -->
  <nav class="navbar">
    <div class="nav-inner">
      <img src="public/logo.svg" alt="VibeCraft Logo" class="nav-logo">
      <span class="nav-title">学生作品展示投票墙</span>
    </div>
  </nav>

  <!-- ====== Hero ====== -->
  <section class="hero">
    <h1 class="hero-title">VibeCraft Studio</h1>
    <p class="hero-subtitle">
      AI 编程集训营 · 2026年5月1-3日<br>
      四位创始成员三天成果展示
    </p>
    <p class="hero-desc">
      点击作品链接查看每位同学的 Day 1 个人主页和 Day 2 产品 V1<br>
      为他们点赞、留言鼓励吧！
    </p>
  </section>

  <!-- ====== 学生卡片网格 ====== -->
  <section class="cards-grid" id="cardsGrid">
    <!-- 由 JS 动态生成 -->
  </section>

  <!-- ====== Footer ====== -->
  <footer class="footer">
    <img src="public/qrcode.png" alt="扫描二维码访问投票墙" class="footer-qr">
    <p>扫描二维码访问投票墙</p>
    <p>VibeCraft Studio © 2026 · 凭感觉做 · 用心打磨</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="src/js/data.js"></script>
  <script src="src/lib/supabase.js"></script>
  <script src="src/js/api.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
